name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

jobs:
  path-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject tracked machine-local paths
        run: |
          python - <<'PY'
          from __future__ import annotations

          import re
          import subprocess
          import sys
          from pathlib import Path

          tracked = subprocess.check_output(["git", "ls-files", "-z"]).decode("utf-8").split("\0")
          text_suffixes = {
              ".md", ".txt", ".py", ".toml", ".yaml", ".yml", ".json", ".ini", ".cfg", ".bat"
          }
          skip_files = {
              "config/file_paths.example.yaml",
              "config/hbn_paths.example.yaml",
          }
          patterns = [
              re.compile(r"[A-Za-z]:\\\\Users\\\\"),
              re.compile(r"/Users/"),
              re.compile(r"/home/"),
          ]

          hits: list[str] = []
          for item in tracked:
              if not item or item in skip_files:
                  continue
              path = Path(item)
              if path.suffix.lower() not in text_suffixes:
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              for pattern in patterns:
                  match = pattern.search(text)
                  if match:
                      line_no = text[: match.start()].count("\n") + 1
                      hits.append(f"{item}:{line_no}:{match.group(0)}")
                      break

          if hits:
              print("Tracked machine-local paths found:")
              for hit in hits:
                  print(hit)
              sys.exit(1)
          PY

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and audit tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install pip-audit

      - name: Audit Python environment
        run: pip-audit --progress-spinner off

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
