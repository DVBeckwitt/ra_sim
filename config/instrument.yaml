# Instrument-specific parameters used by the RA-SIM GUI and simulations.
instrument:
  detector:
    image_size: 3000
    monte_carlo_samples: 1000
    beam_stop_half_size: 40
    intensity_threshold: 1.0
    # Core detector pixel pitch used by the simulation and projection helpers.
    pixel_size_m: 1.0e-4
    vmax: 1000
    vmax_slider_max: 3000
  geometry_defaults:
    distance_m: 0.075
    rot1: 0.0
    rot2: 0.0
    poni1_m: 0.0
    poni2_m: 0.0
    wavelength_m: 1.0e-10
  beam:
    wavelength_angstrom: 1.54
    divergence_fwhm_deg: 0.05
    sigma_mosaic_fwhm_deg: 0.8
    gamma_mosaic_fwhm_deg: 0.7
    eta: 0.0
    # Maximum adaptive interval budget for Ewald/Bragg arc integration.
    # Higher values allow finer arc refinement at increased runtime.
    solve_q_steps: 1000
    # Relative integration tolerance for adaptive Ewald/Bragg arc refinement.
    # Lower values are stricter (more accurate, slower).
    solve_q_rel_tol: 5.0e-4
    # Arc solver mode: adaptive (robust, slower) or uniform (fast).
    solve_q_mode: uniform
    # Relative wavelength spread (percent). Also exposed in the main GUI as
    # "Bandwidth (%)" and persisted in saved parameter profiles.
    bandwidth_percent: 0.7
    bandwidth_sigma_fraction: 5.0e-05
  sample_orientation:
    theta_initial_deg: 6.0
    cor_deg: 0.0
    chi_deg: 0.0
    psi_deg: 0.0
    psi_z_deg: 0.0
    zb: 0.0
    zs: 0.0
    # Finite sample dimensions. Zero keeps the legacy infinite / semi-infinite limits.
    width_m: 0.0
    length_m: 0.0
    depth_m: 0.0
  debye_waller:
    x: 0.0
    y: 0.0
  occupancies:
    default: [1.0, 1.0, 1.0]
  hendricks_teller:
    default_p: [0.01, 0.99, 0.5]
    default_w: [50.0, 50.0, 0.0]
    # Structure-factor pruning bias used by the GUI speed/quality control.
    # -2.0 keeps more points, 0.0 is the recommended default, +2.0 prunes harder.
    sf_prune_bias: 0.0
    phase_delta_expression: "2*pi*((2*h + k)/3)"
    phi_l_divisor: 1.0
    max_miller_index: 19
    include_rods: false
  output:
    write_excel: false
  fit:
    geometry:
      # Per-parameter bounds and sensitivity settings used during geometry fitting.
      #
      # Bounds support three modes:
      # - absolute: min/max are used as-is.
      # - relative: min/max are offsets added to the current parameter value.
      # - relative_min0: like relative, but the lower bound is clamped to >= 0.
      bounds:
        theta_initial: {mode: relative, min: -0.5, max: 0.5}
        theta_offset: {mode: absolute, min: -0.5, max: 0.5}
        zs: {mode: absolute, min: -2.0e-3, max: 2.0e-3}
        zb: {mode: absolute, min: -2.0e-3, max: 2.0e-3}
        chi: {mode: absolute, min: -1.0, max: 1.0}
        cor_angle: {mode: absolute, min: -2.0, max: 2.0}
        gamma: {mode: relative, min: -2.0, max: 2.0}
        Gamma: {mode: relative, min: -2.0, max: 2.0}
        psi_z: {mode: relative, min: -2.0, max: 2.0}
        corto_detector: {mode: relative_min0, min: -0.05, max: 0.05}
      # Per-parameter optimizer sensitivity (scales). Use 1.0 for defaults.
      x_scale:
        theta_initial: 1.0
        theta_offset: 1.0
        zs: 1.0
        zb: 1.0
        chi: 1.0
        cor_angle: 1.0
        gamma: 1.0
        Gamma: 1.0
        psi_z: 1.0
        corto_detector: 1.0
      # Solver settings for geometry least-squares.
      # - loss: residual model used by scipy.optimize.least_squares
      # - f_scale_px: soft transition scale in pixels for robust losses
      # - max_nfev: max objective evaluations per local solve
      # - restarts: random multi-start retries to escape local minima
      # - restart_jitter: fractional perturbation size per restart
      # - workers: outer CPU worker count for independent dataset/restart tasks.
      #   Use auto to scale up to the detected CPU/Numba thread budget.
      # - parallel_mode: auto prefers dataset-level parallelism when fitting
      #   multiple backgrounds, otherwise restart-level parallelism.
      # - worker_numba_threads: per-worker Numba thread mask; 0 auto-splits
      #   the available Numba threads across the active outer workers.
      # - missing_pair_penalty_px: penalty when an HKL has measured peaks
      #   but no simulated points are matchable.
      # - weighted_matching: downweight large point-pair residuals.
      # - use_measurement_uncertainty: scale residuals by picked-point sigma.
      #   Set false only for a pure point-to-point geometry fit.
      # - anisotropic_measurement_uncertainty: interpret measurement sigmas in
      #   detector radial/tangential coordinates rather than isotropically.
      # - radial_sigma_scale / tangential_sigma_scale: fallback scaling applied
      #   when only one scalar sigma is provided per measured peak.
      # - stagnation_probe_pairwise: test coupled parameter moves when the
      #   local solver stays in a flat basin.
      # - stagnation_probe_pair_limit: max number of parameters considered
      #   when building pairwise probe directions.
      # - stagnation_probe_random_directions: optional random probe count for
      #   broader basin search after stagnation.
      solver:
        loss: linear
        f_scale_px: 8.0
        max_nfev: 140
        restarts: 4
        restart_jitter: 0.15
        workers: auto
        parallel_mode: auto
        worker_numba_threads: 0
        missing_pair_penalty_px: 20.0
        weighted_matching: false
        use_measurement_uncertainty: true
        anisotropic_measurement_uncertainty: false
        radial_sigma_scale: 1.0
        tangential_sigma_scale: 1.0
        stagnation_probe_pairwise: true
        stagnation_probe_pair_limit: 6
        stagnation_probe_random_directions: 0
      # Optional coarse ridge/Chamfer stage before ROI refinement.
      # This is geometry-only and is only accepted if it improves the coarse
      # ridge overlap without materially worsening the point residuals.
      ridge_refinement:
        enabled: false
        downsample_factor: 4
        max_nfev: 20
        max_point_cost_increase_fraction: 0.03
        max_point_rms_increase_px: 0.35
        min_ridge_cost_reduction: 1.0e-6
      # Optional second-stage ROI/image refinement after the point fit.
      # Geometry variables stay active, mosaic stays fixed.
      # The stage is only accepted when the ROI/image cost improves without
      # materially degrading the matched-peak geometry residual.
      image_refinement:
        enabled: false
        min_rois: 3
        downsample_factor: 4
        percentile: 90.0
        huber_percentile: 97.0
        per_reflection_quota: 200
        off_tube_fraction: 0.05
        # Normalize per-ROI image-refinement weights so each matched peak
        # contributes equally regardless of intensity.
        equal_peak_weights: true
        max_reflections: 12
        random_reflection_fraction: 0.15
        sampling_temperature: 1.0
        explore_fraction: 0.15
        huber_delta: 2.5
        outlier_mixture: 0.1
        max_nfev: 25
        roi_refresh_threshold: 1.0
        max_point_cost_increase_fraction: 0.05
        max_point_rms_increase_px: 0.5
        min_image_cost_reduction: 1.0e-6
      # Finite-difference Jacobian diagnostics reported after the final solve.
      # Use these to flag underconstrained fits and identify which parameter
      # groups or peaks carry the most leverage.
      identifiability:
        enabled: true
        fd_step_fraction: 0.02
        fd_min_step: 1.0e-4
        condition_number_warn: 1.0e8
        top_peaks_per_parameter: 3
      # Automatic background peak association for geometry fitting.
      auto_match:
        search_radius_px: 24.0
        local_max_size_px: 5
        smooth_sigma_px: 3.0
        min_prominence_sigma: 2.0
        min_match_prominence_sigma: 2.5
        ambiguity_margin_px: 2.0
        ambiguity_ratio_min: 1.15
        k_neighbors: 12
        max_candidate_peaks: 1200
        walk_max_steps: 24
        walk_step_min_gain_sigma: 0.0
        walk_match_score_bonus: 1.0
        ascent_score_weight: 0.15
        # Guardrails: cancel auto-fit if relaxed matches are too far from
        # simulated seeds in the display frame.
        max_mean_distance_px: 22.0
        max_p90_distance_px: 35.0
        relax_radius_growth: 0.65
        # Keep ownership guards fixed while the search radius grows so one
        # seed cannot claim a neighboring seed's background peak.
        relax_ownership_guards: false
        # Keep the initially matched background peaks fixed during fitting.
        # Set true only if you explicitly want to re-run auto-match after each
        # optimizer pass.
        rematch_between_iterations: false
        fit_iterations: 3
        min_matches: 12
        max_display_markers: 120
      # Geometry fitting always evaluates a deterministic center-beam,
      # zero-divergence ray rather than the full sampled beam cloud.
      # Set to false to avoid numba JIT during fitting (useful if numba
      # compilation fails on your Python build).
      use_numba: true
    mosaic_shape:
      # Detector-shape mosaic refinement is geometry-locked and reuses the
      # exact background bundle from the last successful geometry fit.
      solver:
        loss: soft_l1
        f_scale_px: 1.0
        max_nfev: 80
        restarts: 2
        restart_jitter: 0.15
        workers: auto
        parallel_mode: auto
        worker_numba_threads: 0
      roi:
        min_total_rois: 8
        min_per_dataset_rois: 3
        equal_dataset_weights: true
      preprocessing:
        smooth_sigma_px: 1.0
        ridge_percentile: 85.0
    ordered_structure:
      solver:
        coarse_downsample_factor: 2
        loss: soft_l1
        f_scale: 2.0
        coarse_max_nfev: 15
        polish_max_nfev: 10
        restarts: 2
      mask:
        max_reflections: 24
        tube_width_scale: 1.0
        specular_width_scale: 2.5
        equal_peak_weights: true
      defaults:
        coord_window: 0.02
